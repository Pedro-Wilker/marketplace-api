name: Deploy to Contabo
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/apps/minha-api
            git pull origin main
            npm install
            npm run build
            pm2 restart minha-api || pm2 start dist/main.js --name minha-api